<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <!-- Develop an HTML form to collect user details including name, email,
         gender, date of birth, and a submit button. -->
    <h1>User Registration Form</h1>
    <p>Feel this for registration</p>
    <form action="/server">
        <div>
            <!-- <lebel for="name"><b>Name:</b></lebel>
            <input type="text" id="name" placeholder="Enter your name" name="name"> -->
            <b>Name:</b>
            <input type="text">
        </div>
        <br>
        <div>
            <!-- <lebel type="email"><b>E-mail:</b></lebel>
            <input type="email" for="email" placeholder="enter your name" name="email"> -->
            <b>Email:</b>
            <input type="email">
        </div>
        <br>
        <div>
            <b>Gender:</b>
             <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
        </div>
        <br>
        <div>
            <b>Date:</b>
            <input type="date">
        </div>
        <br>
        <button type="submit">
            Submit
        </button>

    </form>
</body>
</html>
