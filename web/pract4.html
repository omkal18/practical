<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css types</title>
    <link rel="stylesheet" href="pract4.css">
    <style>
        h1{
            text-decoration: underline;
        }
        tr{
            background-color: lightgray;
        }
        table{
            border-collapse: collapse;
            width: 50%;
        }

    </style>
</head>
<body>
    <!-- Create a web page and apply inline, internal, and external CSS to style
        headings, paragraphs, and tables. -->

    <h1 style="text-align: center; color: red;">Css styling</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Possimus, quibusdam at enim alias, inventore laudantium optio velit modi, illo earum ipsa omnis blanditiis voluptate incidunt libero dolorem quod quis iste?</p>
    <table border="1" cellpadding="10">
        <tr>
            <th>Name:</th>
            <td>Om Kalhatkar</td>
        </tr>
        <tr>
            <th>Course:</th>
            <td>Computer Engineering</td>
        </tr>
    </table>
</body>
</html>
